# **what?**
# Reusable "release prep" for the dbt Core V2 release: cut the release branch,
# bump the workspace version (`cargo ci bump-cargo-version`), generate the
# changelog with `changie` (batch the unreleased entries into
# `.changes/<version>.md` and merge them into CHANGELOG.md), then commit and
# push the branch as a single commit.
#
# **why?**
# Factored out of `release-v2.yml` so the same prep can be reused by other
# workflows (e.g. nightly releases) via `workflow_call`. A reusable workflow
# runs as its own job on a fresh runner, so version bump and changelog must
# live together here — they share one checkout and produce one release commit.
#
# **when?**
# `workflow_call` only — invoked by `release-v2.yml` (and any future caller).
#
# Changelog behaviour: `changie batch` always consumes (deletes) the
# `.changes/unreleased/*.yaml` entries it batches, including for prerelease
# versions (X.Y.Z-alpha.N / -rc.N). During the alpha phase that's intended —
# each entry appears under exactly the (pre)release it first shipped in.
# `.changes/<version>.md` is the file `release-v2.yml`'s github-release job
# reads for release notes; CHANGELOG.md is regenerated by `changie merge` from
# `.changes/header.tpl.md` plus every `.changes/*.md` version file.

name: Release prep (dbt Core V2)

on:
  workflow_call:
    inputs:
      version:
        description: "Release SemVer. OSS: X.Y.Z or X.Y.Z-{alpha|beta|rc|preview|dev}.N. GA proprietary: X.Y.Z only."
        required: true
        type: string
      dry_run:
        description: "Cut a throwaway release/dry-run/... branch instead of release/vX.Y.Z."
        required: false
        type: boolean
        default: false
      source_ref:
        description: "Source ref to cut the release branch from (default: main)."
        required: false
        type: string
        default: "main"
    outputs:
      branch:
        description: "The release branch that was cut and pushed."
        value: ${{ jobs.prepare-release.outputs.branch }}
      tag:
        description: "The tag to apply to the release branch HEAD (vX.Y.Z)."
        value: ${{ jobs.prepare-release.outputs.tag }}
      version:
        description: "The release version (echo of inputs.version)."
        value: ${{ jobs.prepare-release.outputs.version }}

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  # ------------------------------------------------------------------
  # Cut release/vX.Y.Z, bump workspace version, generate the changelog,
  # push the branch.
  # ------------------------------------------------------------------
  prepare-release:
    name: Prepare release branch
    runs-on: ${{ vars.UBUNTU_RUNNER_32 }}
    permissions:
      contents: write
    outputs:
      branch: ${{ steps.bump.outputs.branch }}
      tag: ${{ steps.bump.outputs.tag }}
      version: ${{ inputs.version }}
    env:
      CARGO_INCREMENTAL: 0
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-tags: true

      - name: Reject pre-existing tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git rev-parse "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists. Pick a new version."
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and dbt-ci build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # Swatinem/rust-cache@v2.9.1
        with:
          shared-key: cargo-ci-tool
          cache-targets: "true"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # mozilla-actions/sccache-action@v0.0.9
        with:
          version: "v0.12.0"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Cut release branch and bump version
        id: bump
        env:
          VERSION: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            BRANCH="release/dry-run/v${VERSION}-${GITHUB_RUN_ID}"
          else
            BRANCH="release/v${VERSION}"
          fi

          if [ "$DRY_RUN" != "true" ] && git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "::error::Branch $BRANCH already exists. Delete it or pick a new version."
            exit 1
          fi

          git switch -c "$BRANCH"

          # Validates SemVer shape, writes [workspace.package].version, refreshes Cargo.lock.
          cargo ci bump-cargo-version "$VERSION"
          git add Cargo.toml Cargo.lock

          {
            echo "branch=$BRANCH"
            echo "tag=v${VERSION}"
          } >> "$GITHUB_OUTPUT"

      # Batch the unreleased changie entries into `.changes/${VERSION}.md` — the
      # file the github-release job reads for release notes — and fold every
      # version file into CHANGELOG.md via merge. Both run against the
      # release-branch checkout; the generated `.changes/${VERSION}.md`, the
      # consumed `.changes/unreleased/*.yaml`, and the regenerated CHANGELOG.md
      # are committed alongside the version bump below.
      - name: Batch changelog
        uses: miniscruff/changie-action@11bcad388e7973948cbcecb10863baf024d5f607 # miniscruff/changie-action@v3
        with:
          version: v1.24.0
          args: batch ${{ inputs.version }}

      - name: Merge changelog into CHANGELOG.md
        uses: miniscruff/changie-action@11bcad388e7973948cbcecb10863baf024d5f607 # miniscruff/changie-action@v3
        with:
          version: v1.24.0
          args: merge

      - name: Commit and push release branch
        env:
          VERSION: ${{ inputs.version }}
          BRANCH: ${{ steps.bump.outputs.branch }}
        run: |
          # `git add <dir>` stages new files, edits, and the deletion of the
          # batched-away unreleased entries.
          git add .changes CHANGELOG.md
          git commit \
            -m "chore: release v${VERSION}" \
            -m "Release workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push origin "$BRANCH"
